<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Replenishment Package</title>

<style>

/* ===============================
   PAGE DEFINITIONS
================================= */

@page portrait {
    size: A4 portrait;
    margin: 15mm;
}

@page landscape {
    size: A4 landscape;
    margin: 15mm;
}

/* ===============================
   SCREEN PREVIEW
================================= */

body {
    margin: 0;
    background: #f0f2f5;
    font-family: "Times New Roman", serif;
    font-size: 11px;
}

/* Portrait preview */
.page-portrait {
    width: 210mm;
    margin: 20px auto;
    padding: 15mm;
    background: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.15);
}

/* Landscape preview */
.page-landscape {
    width: 297mm;
    margin: 20px auto;
    padding: 15mm;
    background: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.15);
}

/* ===============================
   PRINT MODE
================================= */

@media print {

    body {
        background: white;
    }

    .page-portrait {
        page: portrait;
        width: 100%;
        margin: 0;
        padding: 0;
        box-shadow: none;
    }

    .page-landscape {
        page: landscape;
        width: 100%;
        margin: 0;
        padding: 0;
        box-shadow: none;
    }

    .page-break {
        page-break-before: always;
        break-before: page;
    }

    /* Allow tables to split naturally */
    table {
        page-break-inside: auto;
    }

    tr {
        page-break-inside: avoid;
        page-break-after: auto;
    }
}

/* ===============================
   TABLE STYLE
================================= */

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 0.8px solid black;
    padding: 4px;
}

.amount {
    text-align: right;
}

</style>

</head>

<div class="page-break"></div>

</div>

<div class="page-break"></div>

</div>

</html>
